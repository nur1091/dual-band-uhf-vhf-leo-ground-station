name: Validate analysis

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install JavaScript dependency
        run: npm ci

      - name: Generate SGP4 and link results
        run: npm run generate

      - name: Install plotting dependencies
        run: python -m pip install -r requirements.txt

      - name: Regenerate figures
        run: python analysis/python/plot_results.py

      - name: Validate outputs
        run: npm run validate
